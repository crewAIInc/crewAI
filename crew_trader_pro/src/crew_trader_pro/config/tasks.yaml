# Task 4: 首席策略师综合决策（给 chief_strategist）
# ═══════════════════════════════════════════════════════
chief_strategy_task:
  description: >
    当前时间: {current_time}
    交易对: {symbol}（USDT永续合约）
    当前价格: {current_price}

    历史交易记录与纠错信息：
    {learning_bridge}

    你现在已经收到了两位分析师的报告：
    1. K线形态分析师 — 价格形态和支撑阻力
    2. 技术指标分析师 — 多维指标信号和多空评分

    请综合以上两份分析报告，做出最终合约交易决策：

    决策框架：
    1. **共振验证** — 两个维度是否指向同一方向？
       - 两者一致 → 高置信度信号
       - 两者矛盾 → 给出 Neutral，等待明确信号

    2. **优先级排序** — 技术面(70%) > 形态面(30%)

    3. **入场精确化**
       - entry_price 必须是具体数字，不能是当前价格的简单复制
       - 优先在支撑/阻力附近设置限价单
       - 如果当前价格已处于合理入场区域，可使用市价入场

    4. **止损止盈计算**
       - 止损基于 ATR：止损距离 = 1.0~2.0 × ATR
       - 止盈基于盈亏比：盈亏比至少 1.5:1，理想 2:1 以上
       - 止损必须设在关键支撑/阻力之外（留出噪音空间）
       - 明确给出止盈止损的价格（精确到小数点后2位）

    5. **数值验证（必须严格执行）**
       在填写 execution 之前，必须先用以下公式逐步计算并验证：
       - 做多时：profit = take_profit - entry_price, loss = entry_price - stop_loss
       - 做空时：profit = entry_price - take_profit, loss = stop_loss - entry_price
       - risk_reward_ratio = profit / loss（保留1位小数，格式如 "2.1:1"）
       - 如果计算出的盈亏比 < 1.5，必须调整 take_profit 直到盈亏比 ≥ 1.5
       - profit 和 loss 必须都 > 0，否则方向错误需修正
       - position_size_pct = (2% / (loss / entry_price × 100)) / leverage × 100（不超过20%）

    6. **杠杆与仓位**
       - 根据 ADX 趋势强度和波动率选择杠杆：
         * 强趋势(ADX>40) + 低波动 → 可用 10x-20x
         * 普通趋势(ADX 25-40) → 5x-10x
         * 弱趋势/震荡(ADX<25) → 3x-5x 或不开单
       - 单笔最大风险不超过总资金的 2%
       - position_size_pct 必须通过第5步公式计算得出，不能凭感觉填写

    7. **风控约束**
       - 如果大周期(4H)与小周期(M15)方向矛盾，杠杆减半、仓位减半
       - RSI 极端值(>80或<20)时，不追单，等回调
       - 布林带极端挤压时，等突破方向确认后再入场

    8. **历史纠错** — 参考 learning_bridge 中的历史记录，避免重复错误
  expected_output: >
    以严格 JSON 格式返回，字段说明：
    - signal_summary: 各分析维度结论列表，每项含 dimension(K线形态/技术指标), bias, confidence(1-10), key_point
    - action: Strong_Buy / Buy / Neutral / Sell / Strong_Sell
    - confidence_level: HIGH(≥70%) / MEDIUM(40-69%) / LOW(<40%)
    - confidence_pct: 0-100 综合置信度百分比
    - execution: 仅当 action 不是 Neutral 时提供，含：
      * entry_price: 精确入场价格
      * take_profit: 止盈价格
      * stop_loss: 止损价格
      * risk_reward_ratio: 必须 = |take_profit - entry_price| / |stop_loss - entry_price|，保留1位小数（如 2.1:1）
      * position_size_pct: 必须通过公式计算（如 8%）
      * leverage: 建议杠杆倍数（如 10x）
    - reasoning: 决策推理，含 supporting_factors[], opposing_factors[], risk_warning
    - self_review: 自我审查，含 repeated_mistake(bool), max_uncertainty, learning_applied
    - one_liner: 一句话决策摘要（适合推送通知，如：ETH 做多 10x | 入场2300 止损2280 止盈2350）
  agent: chief_strategist
