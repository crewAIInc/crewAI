# ═══════════════════════════════════════════════════════
# Task 1: K线形态分析（给 kline_pattern_analyst）
# ═══════════════════════════════════════════════════════
kline_pattern_task:
  description: >
    当前时间: {current_time}
    交易对: {symbol}
    当前价格: {current_price}

    以下是最近的K线数据（JSON格式）：
    {market_snapshot}

    请对以上K线数据进行形态分析，重点关注：

    1. **单根K线形态识别**
       - 识别最近M5和M15中出现的关键形态（锤子线、吞没、十字星、Pinbar等）
       - 标注每个形态出现的时间和价格位置

    2. **多根K线组合形态**
       - 是否出现反转组合（早晨之星、黄昏之星、三只乌鸦等）
       - 是否出现持续组合（上升三法、旗形整理等）
       - M5和M15周期的形态是否一致

    3. **关键价格位**
       - 根据K线数据标注近期的支撑位和阻力位
       - 标注当前价格距离支撑/阻力的距离

    4. **量价关系**
       - vol_ratio > 1.5 的K线是否伴随关键形态
       - 价格突破时成交量是否配合
       - 是否出现量价背离
  expected_output: >
    ## K线形态分析报告

    ### 关键形态识别
    按重要性排序列出发现的所有关键形态，每个包含：
    - 时间、周期(M5/M15/H1)、形态名称（如锤子线、吞没、Pinbar）
    - 形态类型（反转/持续/犹豫）
    - 多空含义及重要性(1-5)

    ### 支撑阻力位
    - 阻力1: 价格 (距当前 +X%, 触及N次)
    - 阻力2: 价格 (距当前 +X%, 触及N次)
    - 支撑1: 价格 (距当前 -X%, 触及N次)
    - 支撑2: 价格 (距当前 -X%, 触及N次)

    ### 量价关系评估
    - 量价配合度：Strong / Weak / Divergence
    - vol_ratio > 1.5 的K线数量及分布
    - 是否存在量价背离

    ### 多周期一致性
    - M5偏向 / M15偏向 / H1偏向
    - 三个周期是否对齐

    ### 形态综合结论
    - 偏向：看多 / 看空 / 中性
    - 置信度：X/10
    - 一句话总结

    使用 Markdown 格式
  agent: kline_pattern_analyst

# ═══════════════════════════════════════════════════════
# Task 2: 技术指标分析（给 technical_indicator_analyst）
# ═══════════════════════════════════════════════════════
technical_indicator_task:
  description: >
    当前时间: {current_time}
    交易对: {symbol}
    当前价格: {current_price}

    以下是完整的技术指标数据（JSON格式）：
    {technical_indicators}

    请对以上技术指标进行多维度分析：

    1. **趋势分析（EMA + ADX）**
       - EMA 20/50/200 的排列状态及含义
       - 价格与 EMA20 的距离是否过大（回调风险）
       - ADX 值判断当前是趋势市还是震荡市
       - 大周期(4H/1H)趋势方向与M15是否一致

    2. **动量分析（RSI + MACD）**
       - RSI 当前值及所处区间的交易含义
       - RSI 是否接近极端值（< 30 或 > 70）
       - MACD 金叉/死叉状态及零轴位置
       - 是否存在价格与指标的背离

    3. **波动率分析（BB + ATR）**
       - 布林带当前状态（挤压/扩张/稳定）
       - 挤压状态是否预示即将突破
       - ATR 与历史平均的对比（波动率排名）
       - 当前波动率对止损设置的建议

    4. **多周期对齐分析**
       - M15 信号与 4H/1H 大周期是否对齐
       - H4 RSI 与 H1 RSI 是否同步处于超买/超卖区间
       - 如存在冲突，哪个周期更可信
       - 市场结构(Higher_High/Lower_Low等)的含义

    5. **指标间矛盾检测**
       - 列出所有指标间存在矛盾的信号对
       - 对每个矛盾给出解读和权衡建议

    6. **衍生品风险分析（资金费率 + 持仓 + 清算风险）**
       - funding_rate 与 funding_rate_pct 是否处于拥挤区间
       - open_interest_change_24h 是增仓驱动还是减仓驱动
       - liquidation_risk_level 对当前策略的影响（是否需要降杠杆/降仓位）
       - 若衍生品信号与现货技术信号冲突，明确给出优先级建议
  expected_output: >
    ## 技术指标分析报告

    ### 指标信号汇总表
    | 指标 | 当前值/状态 | 多空信号 | 权重 |
    |------|-----------|---------|------|
    | EMA排列 | ... | 多/空/中性 | 高/中/低 |
    | RSI(14) | ... | ... | ... |
    | MACD | ... | ... | ... |
    | BB(布林带) | ... | ... | ... |
    | ADX | ... | ... | ... |
    | 4H趋势 | ... | ... | ... |
    | 1H趋势 | ... | ... | ... |
    | H4 RSI | ... | ... | ... |
    | H1 RSI | ... | ... | ... |
    | 资金费率 | ... | ... | ... |
    | 未平仓变化(24h) | ... | ... | ... |
    | 清算风险等级 | ... | ... | ... |

    ### 指标矛盾清单
    列出存在矛盾的指标对，每对含：矛盾表现 + 权衡建议
    （无矛盾则注明"当前无指标矛盾"）

    ### 多周期对齐分析
    - 4H偏向 / 1H偏向 / M15偏向
    - 对齐状态：Aligned / Conflict / Neutral
    - 冲突说明（如有）

    ### 衍生品风险分析
    - 资金费率：是否拥挤（多头拥挤 / 空头拥挤 / 中性）
    - 持仓变化：增仓上涨 / 增仓下跌 / 减仓反弹 等结构判断
    - 清算风险：Low / Medium / High
    - 风控建议：是否降低杠杆与仓位

    ### 综合评分与结论
    - 多空评分：X（-10极度看空 ~ +10极度看多）
    - 偏向：看多 / 看空 / 中性
    - 置信度：X/10
    - 一句话总结

    使用 Markdown 格式
  agent: technical_indicator_analyst

