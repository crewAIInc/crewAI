services:
  # ============== Redis ==============
  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ============== Ollama ==============
  ollama:
    image: ollama/ollama:latest
    container_name: crypto-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============== 拉取模型（初始化，只运行一次）==============
  ollama-init:
    image: ollama/ollama:latest
    container_name: crypto-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull gemma3:1b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

volumes:
  redis_data:
  ollama_data:
