      often contain important personal details (e.g. \\\"by the way, it took me 4
      hours\\\" or \\\"my Golden Retriever Max\\\")\\n\\nPreserve exact names and
      numbers \u2014 never generalize (e.g. keep \\\"lavender gin fizz\\\" not just
      \\\"cocktail\\\", keep \\\"12 largemouth bass\\\" not just \\\"fish caught\\\",
      keep \\\"Golden Retriever\\\" not just \\\"dog\\\").\\n\\nAdditional extraction
      rules:\\n- Presupposed facts: When the user reveals a fact indirectly in a question
      (e.g. \\\"What collar suits a Golden Retriever like Max?\\\" presupposes Max
      is a Golden Retriever), extract that fact as a separate memory.\\n- Date precision:
      Always preserve the full date including day-of-month when stated (e.g. \\\"February
      14th\\\" not just \\\"February\\\", \\\"March 5\\\" not just \\\"March\\\").\\n-
      Life events in passing: When the user mentions a life event (birth, wedding,
      graduation, move, adoption) while discussing something else, extract the life
      event as its own memory (e.g. \\\"my friend David had a baby boy named Jasper\\\"
      is a birth fact, even if mentioned while planning to send congratulations).\\n\\nIf
      there is nothing worth remembering (e.g. empty result, no decisions or facts),
      return an empty list.\\nOutput a JSON object with a single key \\\"memories\\\"
      whose value is a list of strings.\"},{\"role\":\"user\",\"content\":\"Content:\\nTask:
