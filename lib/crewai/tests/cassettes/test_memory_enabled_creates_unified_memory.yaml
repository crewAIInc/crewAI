      are symbols that represent quantities or amounts. Counting is the process of
      saying numbers in order to find out how many objects there are. Teaching this
      concept helps the child grasp the idea of quantity and the relationship between
      numbers.\\n\\nAngle:\\nMake counting fun and relatable by using everyday objects
      the child is familiar with, such as toys, fruits, or blocks. Use a story or
      a game to engage the child and encourage active participation. For example,
      you can create a counting game where the child has to count the number of apples
      in a basket or the number of steps while climbing stairs.\\n\\nExamples:\\n1.
      Counting Toys: Gather different toys and ask the child to count them one by
      one. \\\"Let's count how many toy cars you have. One, two, three, four, five.
      You have five toy cars!\\\"\\n2. Counting Fruits: Show the child a bowl of fruits
      and count together. \\\"Look at these apples! Let's count them. One apple, two
      apples, three apples. There are three apples in the bowl.\\\"\\n3. Steps Counting
      Game: When going up or down stairs, count each step aloud with the child. \\\"Step
      one, step two, step three. Let's see how many steps it takes to reach the door.\\\"\\n4.
      Story Counting: Create a simple story involving animals or characters where
      the child counts items along the way. \\\"There are three little ducks swimming
      in the pond. One duck goes to the shore, how many are left? Two ducks.\\\"\\n\\nBy
      incorporating counting into daily activities and encouraging hands-on practice,
