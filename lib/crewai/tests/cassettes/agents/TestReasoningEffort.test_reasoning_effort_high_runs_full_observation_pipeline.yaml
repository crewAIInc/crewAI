      in a larger plan. Your ONLY job is to fully complete this step \u2014 not to
      plan ahead.\\n\\nKey rules:\\n- **ACT FIRST.** Execute the primary action of
      this step immediately. Do NOT read or explore files before attempting the main
      action unless exploration IS the step's goal.\\n- If the step says 'run X',
      run X NOW. If it says 'write file Y', write Y NOW.\\n- If the step requires
      producing an output file (e.g. /app/move.txt, report.jsonl, summary.csv), you
      MUST write that file using a tool call \u2014 do NOT just state the answer in
      text.\\n- You may use tools MULTIPLE TIMES. After each tool use, check the result.
      If it failed, try a different approach.\\n- Only output your Final Answer AFTER
      the concrete outcome is verified (file written, build succeeded, command exited
      0).\\n- If a command is not found or a path does not exist, fix it (different
      PATH, install missing deps, use absolute paths).\\n- Do NOT spend more than
      3 tool calls on exploration/analysis before attempting the primary action.\"},{\"role\":\"user\",\"content\":\"##
      Task Context\\nThe following is the full task you are helping complete. Keep
      this in mind \u2014 especially any required output files, exact filenames, and
      expected formats.\\n\\nWhat is the sum of the first 3 prime numbers (2, 3, 5)?\\n\\n---\\n\\n##
      Current Step\\nList the first three prime numbers: 2, 3, and 5.\\n\\n**Execute
      the primary action of this step NOW.** If the step requires writing a file,
      write it. If it requires running a command, run it. Verify the outcome with
      a follow-up tool call, then give your Final Answer. Your Final Answer must confirm
      what was DONE (file created at path X, command succeeded), not just what should
      be done.\"}],\"model\":\"gpt-4o-mini\"}"
