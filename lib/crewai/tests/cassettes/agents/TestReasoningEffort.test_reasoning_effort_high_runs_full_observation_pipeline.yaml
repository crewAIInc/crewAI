      CONCRETE, EXECUTABLE steps. Each step must clearly state WHAT ACTION to take
      and HOW to verify it succeeded. The number of steps should match the task complexity.
      Hard limit: 10 steps.\\n\\n## Rules:\\n- Each step must have a clear DONE criterion\\n-
      Do NOT group unrelated actions: if steps can fail independently, keep them separate\\n-
      NO standalone \\\"thinking\\\" or \\\"planning\\\" steps \u2014 act, don't just
      observe\\n- The last step must produce the required output\\n\\nAfter your plan,
      state READY or NOT READY.\"}],\"model\":\"gpt-4o-mini\",\"tool_choice\":\"auto\",\"tools\":[{\"type\":\"function\",\"function\":{\"name\":\"create_reasoning_plan\",\"description\":\"Create
      or refine a reasoning plan for a task with structured steps\",\"strict\":true,\"parameters\":{\"type\":\"object\",\"properties\":{\"plan\":{\"type\":\"string\",\"description\":\"A
      brief summary of the overall plan.\"},\"steps\":{\"type\":\"array\",\"description\":\"List
      of discrete steps to execute the plan\",\"items\":{\"type\":\"object\",\"properties\":{\"step_number\":{\"type\":\"integer\",\"description\":\"Step
      number (1-based)\"},\"description\":{\"type\":\"string\",\"description\":\"What
      to do in this step\"},\"tool_to_use\":{\"type\":[\"string\",\"null\"],\"description\":\"Tool
      to use for this step, or null if no tool needed\"},\"depends_on\":{\"type\":\"array\",\"items\":{\"type\":\"integer\"},\"description\":\"Step
      numbers this step depends on (empty array if none)\"}},\"required\":[\"step_number\",\"description\",\"tool_to_use\",\"depends_on\"],\"additionalProperties\":false}},\"ready\":{\"type\":\"boolean\",\"description\":\"Whether
