        alt=\\\"PyPI downloads\\\">\\n  </a>\\n  <a href=\\\"https://twitter.com/crewAIInc\\\">\\n
        \   <img src=\\\"https://img.shields.io/twitter/follow/crewAIInc?style=social\\\"
        alt=\\\"Twitter Follow\\\">\\n  </a>\\n</p>\\n\\n### Fast and Flexible Multi-Agent
        Automation Framework\\n\\n> CrewAI is a lean, lightning-fast Python framework
        built entirely from scratch\u2014completely **independent of LangChain or
        other agent frameworks**.\\n> It empowers developers with both high-level
        simplicity and precise low-level control, ideal for creating autonomous AI
        agents tailored to any scenario.\\n\\n- **CrewAI Crews**: Optimize for autonomy
        and collaborative intelligence.\\n- **CrewAI Flows**: Enable granular, event-driven
        control, single LLM calls for precise task orchestration and supports Crews
        natively\\n\\nWith over 100,000 developers certified through our community
        courses at [learn.crewai.com](https://learn.crewai.com), CrewAI is rapidly
        becoming the\\nstandard for enterprise-ready AI automation.\\n\\n# CrewAI
        AMP Suite\\n\\nCrewAI AMP Suite is a comprehensive bundle tailored for organizations
        that require secure, scalable, and easy-to-manage agent-driven automation.\\n\\nYou
        can try one part of the suite the [Crew Control Plane for free](https://app.crewai.com)\\n\\n##
        Crew Control Plane Key Features:\\n\\n- **Tracing & Observability**: Monitor
        and track your AI agents and workflows in real-time, including metrics, logs,
        and traces.\\n- **Unified Control Plane**: A centralized platform for managing,
        monitoring, and scaling your AI agents and workflows.\\n- **Seamless Integrations**:
        Easily connect with existing enterprise systems, data sources, and cloud infrastructure.\\n-
        **Advanced Security**: Built-in robust security and compliance measures ensuring
        safe deployment and management.\\n- **Actionable Insights**: Real-time analytics
        and reporting to optimize performance and decision-making.\\n- **24/7 Support**:
        Dedicated enterprise support to ensure uninterrupted operation and quick resolution
        of issues.\\n- **On-premise and Cloud Deployment Options**: Deploy CrewAI
        AMP on-premise or in the cloud, depending on your security and compliance
        requirements.\\n\\nCrewAI AMP is designed for enterprises seeking a powerful,
        reliable solution to transform complex business processes into efficient,\\nintelligent
        automations.\\n\\n## Table of contents\\n\\n- [Why CrewAI?](#why-crewai)\\n-
        [Getting Started](#getting-started)\\n- [Key Features](#key-features)\\n-
        [Understanding Flows and Crews](#understanding-flows-and-crews)\\n- [CrewAI
        vs LangGraph](#how-crewai-compares)\\n- [Examples](#examples)\\n  - [Quick
        Tutorial](#quick-tutorial)\\n  - [Write Job Descriptions](#write-job-descriptions)\\n
        \ - [Trip Planner](#trip-planner)\\n  - [Stock Analysis](#stock-analysis)\\n
        \ - [Using Crews and Flows Together](#using-crews-and-flows-together)\\n-
        [Connecting Your Crew to a Model](#connecting-your-crew-to-a-model)\\n- [How
        CrewAI Compares](#how-crewai-compares)\\n- [Frequently Asked Questions (FAQ)](#frequently-asked-questions-faq)\\n-
        [Contribution](#contribution)\\n- [Telemetry](#telemetry)\\n- [License](#license)\\n\\n##
        Why CrewAI?\\n\\n<div align=\\\"center\\\" style=\\\"margin-bottom: 30px;\\\">\\n
        \ <img src=\\\"docs/images/asset.png\\\" alt=\\\"CrewAI Logo\\\" width=\\\"100%\\\">\\n</div>\\n\\nCrewAI
        unlocks the true potential of multi-agent automation, delivering the best-in-class
        combination of speed, flexibility, and control with either Crews of AI Agents
        or Flows of Events:\\n\\n- **Standalone Framework**: Built from scratch, independent
        of LangChain or any other agent framework.\\n- **High Performance**: Optimized
        for speed and minimal resource usage, enabling faster execution.\\n- **Flexible
        Low Level Customization**: Complete freedom to customize at both high and
        low levels - from overall workflows and system architecture to granular agent
        behaviors, internal prompts, and execution logic.\\n- **Ideal for Every Use
        Case**: Proven effective for both simple tasks and highly complex, real-world,
        enterprise-grade scenarios.\\n- **Robust Community**: Backed by a rapidly
        growing community of over **100,000 certified** developers offering comprehensive
        support and resources.\\n\\nCrewAI empowers developers and enterprises to
        confidently build intelligent automations, bridging the gap between simplicity,
        flexibility, and performance.\\n\\n## Getting Started\\n\\nSetup and run your
        first CrewAI agents by following this tutorial.\\n\\n[![CrewAI Getting Started
        Tutorial](https://img.youtube.com/vi/-kSOTtYzgEw/hqdefault.jpg)](https://www.youtube.com/watch?v=-kSOTtYzgEw
        \\\"CrewAI Getting Started Tutorial\\\")\\n\\n###\\n\\nLearning Resources\\n\\nLearn
        CrewAI through our comprehensive courses:\\n\\n- [Multi AI Agent Systems with
        CrewAI](https://www.deeplearning.ai/short-courses/multi-ai-agent-systems-with-crewai/)
        - Master the fundamentals of multi-agent systems\\n- [Practical Multi AI Agents
        and Advanced Use Cases](https://www.deeplearning.ai/short-courses/practical-multi-ai-agents-and-advanced-use-cases-with-crewai/)
        - Deep dive into advanced implementations\\n\\n### Understanding Flows and
        Crews\\n\\nCrewAI offers two powerful, complementary approaches that work
        seamlessly together to build sophisticated AI applications:\\n\\n1. **Crews**:
        Teams of AI agents with true autonomy and agency, working together to accomplish
        complex tasks through role-based collaboration. Crews enable:\\n\\n   - Natural,
        autonomous decision-making between agents\\n   - Dynamic task delegation and
        collaboration\\n   - Specialized roles with defined goals and expertise\\n
        \  - Flexible problem-solving approaches\\n\\n2. **Flows**: Production-ready,
        event-driven workflows that deliver precise control over complex automations.
        Flows provide:\\n\\n   - Fine-grained control over execution paths for real-world
        scenarios\\n   - Secure, consistent state management between tasks\\n   -
        Clean integration of AI agents with production Python code\\n   - Conditional
        branching for complex business logic\\n\\nThe true power of CrewAI emerges
        when combining Crews and Flows. This synergy allows you to:\\n\\n- Build complex,
        production-grade applications\\n- Balance autonomy with precise control\\n-
        Handle sophisticated real-world scenarios\\n- Maintain clean, maintainable
        code structure\\n\\n### Getting Started with Installation\\n\\nTo get started
        with CrewAI, follow these simple steps:\\n\\n### 1. Installation\\n\\nEnsure
        you have Python >=3.10 <3.14 installed on your system. CrewAI uses [UV](https://docs.astral.sh/uv/)
        for dependency management and package handling, offering a seamless setup
        and execution experience.\\n\\nFirst, install CrewAI:\\n\\n```shell\\npip
        install crewai\\n```\\n\\nIf you want to install the 'crewai' package along
        with its optional features that include additional tools for agents, you can
        do so by using the following command:\\n\\n```shell\\npip install 'crewai[tools]'\\n```\\n\\nThe
        command above installs the basic package and also adds extra components which
        require more dependencies to function.\\n\\n### Troubleshooting Dependencies\\n\\nIf
        you encounter issues during installation or usage, here are some common solutions:\\n\\n####
        Common Issues\\n\\n1. **ModuleNotFoundError: No module named 'tiktoken'**\\n\\n
        \  - Install tiktoken explicitly: `pip install 'crewai[embeddings]'`\\n   -
        If using embedchain or other tools: `pip install 'crewai[tools]'`\\n\\n2.
        **Failed building wheel for tiktoken**\\n\\n   - Ensure Rust compiler is installed
        (see installation steps above)\\n   - For Windows: Verify Visual C++ Build
        Tools are installed\\n   - Try upgrading pip: `pip install --upgrade pip`\\n
        \  - If issues persist, use a pre-built wheel: `pip install tiktoken --prefer-binary`\\n\\n###
        2. Setting Up Your Crew with the YAML Configuration\\n\\nTo create a new CrewAI
        project, run the following CLI (Command Line Interface) command:\\n\\n```shell\\ncrewai
        create crew <project_name>\\n```\\n\\nThis command creates a new project folder
        with the following structure:\\n\\n```\\nmy_project/\\n\u251C\u2500\u2500
        .gitignore\\n\u251C\u2500\u2500 pyproject.toml\\n\u251C\u2500\u2500 README.md\\n\u251C\u2500\u2500
        .env\\n\u2514\u2500\u2500 src/\\n    \u2514\u2500\u2500 my_project/\\n        \u251C\u2500\u2500
        __init__.py\\n        \u251C\u2500\u2500 main.py\\n        \u251C\u2500\u2500
        crew.py\\n        \u251C\u2500\u2500 tools/\\n        \u2502   \u251C\u2500\u2500
        custom_tool.py\\n        \u2502   \u2514\u2500\u2500 __init__.py\\n        \u2514\u2500\u2500
        config/\\n            \u251C\u2500\u2500 agents.yaml\\n            \u2514\u2500\u2500
        tasks.yaml\\n```\\n\\nYou can now start developing your crew by editing the
        files in the `src/my_project` folder. The `main.py` file is the entry point
        of the project, the `crew.py` file is where you define your crew, the `agents.yaml`
        file is where you define your agents, and the `tasks.yaml` file is where you
        define your tasks.\\n\\n#### To customize your project, you can:\\n\\n- Modify
        `src/my_project/config/agents.yaml` to define your agents.\\n- Modify `src/my_project/config/tasks.yaml`
        to define your tasks.\\n- Modify `src/my_project/crew.py` to add your own
        logic, tools, and specific arguments.\\n- Modify `src/my_project/main.py`
        to add custom inputs for your agents and tasks.\\n- Add your environment variables
        into the `.env` file.\\n\\n#### Example of a simple crew with a sequential
        process:\\n\\nInstantiate your crew:\\n\\n```shell\\ncrewai create crew latest-ai-development\\n```\\n\\nModify
        the files as needed to fit your use case:\\n\\n**agents.yaml**\\n\\n```yaml\\n#
        src/my_project/config/agents.yaml\\nresearcher:\\n  role: >\\n    {topic}
        Senior Data Researcher\\n  goal: >\\n    Uncover cutting-edge developments
        in {topic}\\n  backstory: >\\n    You're a seasoned researcher with a knack
        for uncovering the latest\\n    developments in {topic}. Known for your ability
        to find the most relevant\\n    information and present it in a clear and
        concise manner.\\n\\nreporting_analyst:\\n  role: >\\n    {topic} Reporting
        Analyst\\n  goal: >\\n    Create detailed reports based on {topic} data analysis
        and research findings\\n  backstory: >\\n    You're a meticulous analyst with
        a keen eye for detail. You're known for\\n    your ability to turn complex
        data into clear and concise reports, making\\n    it easy for others to understand
        and act on the information you provide.\\n```\\n\\n**tasks.yaml**\\n\\n````yaml\\n#
        src/my_project/config/tasks.yaml\\nresearch_task:\\n  description: >\\n    Conduct
        a thorough research about {topic}\\n    Make sure you find any interesting
        and relevant information given\\n    the current year is 2025.\\n  expected_output:
        >\\n    A list with 10 bullet points of the most relevant information about
        {topic}\\n  agent: researcher\\n\\nreporting_task:\\n  description: >\\n    Review
        the context you got and expand each topic into a full section for a report.\\n
        \   Make sure the report is detailed and contains any and all relevant information.\\n
        \ expected_output: >\\n    A fully fledge reports with the mains topics, each
        with a full section of information.\\n    Formatted as markdown without '```'\\n
        \ agent: reporting_analyst\\n  output_file: report.md\\n````\\n\\n**crew.py**\\n\\n```python\\n#
        src/my_project/crew.py\\nfrom crewai import Agent, Crew, Process, Task\\nfrom
        crewai.project import CrewBase, agent, crew, task\\nfrom crewai_tools import
        SerperDevTool\\nfrom crewai.agents.agent_builder.base_agent import BaseAgent\\nfrom
        typing import List\\n\\n@CrewBase\\nclass LatestAiDevelopmentCrew():\\n\\t\\\"\\\"\\\"LatestAiDevelopment
        crew\\\"\\\"\\\"\\n\\tagents: List[BaseAgent]\\n\\ttasks: List[Task]\\n\\n\\t@agent\\n\\tdef
        researcher(self) -> Agent:\\n\\t\\treturn Agent(\\n\\t\\t\\tconfig=self.agents_config['researcher'],\\n\\t\\t\\tverbose=True,\\n\\t\\t\\ttools=[SerperDevTool()]\\n\\t\\t)\\n\\n\\t@agent\\n\\tdef
        reporting_analyst(self) -> Agent:\\n\\t\\treturn Agent(\\n\\t\\t\\tconfig=self.agents_config['reporting_analyst'],\\n\\t\\t\\tverbose=True\\n\\t\\t)\\n\\n\\t@task\\n\\tdef
        research_task(self) -> Task:\\n\\t\\treturn Task(\\n\\t\\t\\tconfig=self.tasks_config['research_task'],\\n\\t\\t)\\n\\n\\t@task\\n\\tdef
        reporting_task(self) -> Task:\\n\\t\\treturn Task(\\n\\t\\t\\tconfig=self.tasks_config['reporting_task'],\\n\\t\\t\\toutput_file='report.md'\\n\\t\\t)\\n\\n\\t@crew\\n\\tdef
        crew(self) -> Crew:\\n\\t\\t\\\"\\\"\\\"Creates the LatestAiDevelopment crew\\\"\\\"\\\"\\n\\t\\treturn
        Crew(\\n\\t\\t\\tagents=self.agents, # Automatically created by the @agent
        decorator\\n\\t\\t\\ttasks=self.tasks, # Automatically created by the @task
        decorator\\n\\t\\t\\tprocess=Process.sequential,\\n\\t\\t\\tverbose=True,\\n\\t\\t)\\n```\\n\\n**main.py**\\n\\n```python\\n#!/usr/bin/env
        python\\n# src/my_project/main.py\\nimport sys\\nfrom latest_ai_development.crew
        import LatestAiDevelopmentCrew\\n\\ndef run():\\n    \\\"\\\"\\\"\\n    Run
        the crew.\\n    \\\"\\\"\\\"\\n    inputs = {\\n        'topic': 'AI Agents'\\n
        \   }\\n    LatestAiDevelopmentCrew().crew().kickoff(inputs=inputs)\\n```\\n\\n###
        3. Running Your Crew\\n\\nBefore running your crew, make sure you have the
        following keys set as environment variables in your `.env` file:\\n\\n- An
        [OpenAI API key](https://platform.openai.com/account/api-keys) (or other LLM
        API key): `OPENAI_API_KEY=sk-...`\\n- A [Serper.dev](https://serper.dev/)
        API key: `SERPER_API_KEY=YOUR_KEY_HERE`\\n\\nLock the dependencies and install
        them by using the CLI command but first, navigate to your project directory:\\n\\n```shell\\ncd
        my_project\\ncrewai install (Optional)\\n```\\n\\nTo run your crew, execute
        the following command in the root of your project:\\n\\n```bash\\ncrewai run\\n```\\n\\nor\\n\\n```bash\\npython
        src/my_project/main.py\\n```\\n\\nIf an error happens due to the usage of
        poetry, please run the following command to update your crewai package:\\n\\n```bash\\ncrewai
        update\\n```\\n\\nYou should see the output in the console and the `report.md`
        file should be created in the root of your project with the full final report.\\n\\nIn
        addition to the sequential process, you can use the hierarchical process,
        which automatically assigns a manager to the defined crew to properly coordinate
        the planning and execution of tasks through delegation and validation of results.
        [See more about the processes here](https://docs.crewai.com/core-concepts/Processes/).\\n\\n##
        Key Features\\n\\nCrewAI stands apart as a lean, standalone, high-performance
        multi-AI Agent framework delivering simplicity, flexibility, and precise control\u2014free
        from the complexity and limitations found in other agent frameworks.\\n\\n-
        **Standalone & Lean**: Completely independent from other frameworks like LangChain,
        offering faster execution and lighter resource demands.\\n- **Flexible & Precise**:
        Easily orchestrate autonomous agents through intuitive [Crews](https://docs.crewai.com/concepts/crews)
        or precise [Flows](https://docs.crewai.com/concepts/flows), achieving perfect
        balance for your needs.\\n- **Seamless Integration**: Effortlessly combine
        Crews (autonomy) and Flows (precision) to create complex, real-world automations.\\n-
        **Deep Customization**: Tailor every aspect\u2014from high-level workflows
        down to low-level internal prompts and agent behaviors.\\n- **Reliable Performance**:
        Consistent results across simple tasks and complex, enterprise-level automations.\\n-
        **Thriving Community**: Backed by robust documentation and over 100,000 certified
        developers, providing exceptional support and guidance.\\n\\nChoose CrewAI
        to easily build powerful, adaptable, and production-ready AI automations.\\n\\n##
        Examples\\n\\nYou can test different real life examples of AI crews in the
        [CrewAI-examples repo](https://github.com/crewAIInc/crewAI-examples?tab=readme-ov-file):\\n\\n-
        [Landing Page Generator](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/landing_page_generator)\\n-
        [Having Human input on the execution](https://docs.crewai.com/how-to/Human-Input-on-Execution)\\n-
        [Trip Planner](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/trip_planner)\\n-
        [Stock Analysis](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/stock_analysis)\\n\\n###
        Quick Tutorial\\n\\n[![CrewAI Tutorial](https://img.youtube.com/vi/tnejrr-0a94/maxresdefault.jpg)](https://www.youtube.com/watch?v=tnejrr-0a94
        \\\"CrewAI Tutorial\\\")\\n\\n### Write Job Descriptions\\n\\n[Check out code
        for this example](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/job-posting)
        or watch a video below:\\n\\n[![Jobs postings](https://img.youtube.com/vi/u98wEMz-9to/maxresdefault.jpg)](https://www.youtube.com/watch?v=u98wEMz-9to
        \\\"Jobs postings\\\")\\n\\n### Trip Planner\\n\\n[Check out code for this
        example](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/trip_planner)
        or watch a video below:\\n\\n[![Trip Planner](https://img.youtube.com/vi/xis7rWp-hjs/maxresdefault.jpg)](https://www.youtube.com/watch?v=xis7rWp-hjs
        \\\"Trip Planner\\\")\\n\\n### Stock Analysis\\n\\n[Check out code for this
        example](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/stock_analysis)
        or watch a video below:\\n\\n[![Stock Analysis](https://img.youtube.com/vi/e0Uj4yWdaAg/maxresdefault.jpg)](https://www.youtube.com/watch?v=e0Uj4yWdaAg
        \\\"Stock Analysis\\\")\\n\\n### Using Crews and Flows Together\\n\\nCrewAI's
        power truly shines when combining Crews with Flows to create sophisticated
        automation pipelines.\\nCrewAI flows support logical operators like `or_`
        and `and_` to combine multiple conditions. This can be used with `@start`,
        `@listen`, or `@router` decorators to create complex triggering conditions.\\n\\n-
        `or_`: Triggers when any of the specified conditions are met.\\n- `and_`Triggers
        when all of the specified conditions are met.\\n\\nHere's how you can orchestrate
        multiple Crews within a Flow:\\n\\n```python\\nfrom crewai.flow.flow import
        Flow, listen, start, router, or_\\nfrom crewai import Crew, Agent, Task, Process\\nfrom
        pydantic import BaseModel\\n\\n# Define structured state for precise control\\nclass
        MarketState(BaseModel):\\n    sentiment: str = \\\"neutral\\\"\\n    confidence:
        float = 0.0\\n    recommendations: list = []\\n\\nclass AdvancedAnalysisFlow(Flow[MarketState]):\\n
        \   @start()\\n    def fetch_market_data(self):\\n        # Demonstrate low-level
        control with structured state\\n        self.state.sentiment = \\\"analyzing\\\"\\n
        \       return {\\\"sector\\\": \\\"tech\\\", \\\"timeframe\\\": \\\"1W\\\"}
        \ # These parameters match the task description template\\n\\n    @listen(fetch_market_data)\\n
        \   def analyze_with_crew(self, market_data):\\n        # Show crew agency
        through specialized roles\\n        analyst = Agent(\\n            role=\\\"Senior
        Market Analyst\\\",\\n            goal=\\\"Conduct deep market analysis with
        expert insight\\\",\\n            backstory=\\\"You're a veteran analyst known
        for identifying subtle market patterns\\\"\\n        )\\n        researcher
        = Agent(\\n            role=\\\"Data Researcher\\\",\\n            goal=\\\"Gather
        and validate supporting market data\\\",\\n            backstory=\\\"You excel
        at finding and correlating multiple data sources\\\"\\n        )\\n\\n        analysis_task
        = Task(\\n            description=\\\"Analyze {sector} sector data for the
        past {timeframe}\\\",\\n            expected_output=\\\"Detailed market analysis
        with confidence score\\\",\\n            agent=analyst\\n        )\\n        research_task
        = Task(\\n            description=\\\"Find supporting data to validate the
        analysis\\\",\\n            expected_output=\\\"Corroborating evidence and
        potential contradictions\\\",\\n            agent=researcher\\n        )\\n\\n
        \       # Demonstrate crew autonomy\\n        analysis_crew = Crew(\\n            agents=[analyst,
        researcher],\\n            tasks=[analysis_task, research_task],\\n            process=Process.sequential,\\n
        \           verbose=True\\n        )\\n        return analysis_crew.kickoff(inputs=market_data)
        \ # Pass market_data as named inputs\\n\\n    @router(analyze_with_crew)\\n
        \   def determine_next_steps(self):\\n        # Show flow control with conditional
        routing\\n        if self.state.confidence > 0.8:\\n            return \\\"high_confidence\\\"\\n
        \       elif self.state.confidence > 0.5:\\n            return \\\"medium_confidence\\\"\\n
        \       return \\\"low_confidence\\\"\\n\\n    @listen(\\\"high_confidence\\\")\\n
        \   def execute_strategy(self):\\n        # Demonstrate complex decision making\\n
        \       strategy_crew = Crew(\\n            agents=[\\n                Agent(role=\\\"Strategy
        Expert\\\",\\n                      goal=\\\"Develop optimal market strategy\\\")\\n
        \           ],\\n            tasks=[\\n                Task(description=\\\"Create
        detailed strategy based on analysis\\\",\\n                     expected_output=\\\"Step-by-step
        action plan\\\")\\n            ]\\n        )\\n        return strategy_crew.kickoff()\\n\\n
        \   @listen(or_(\\\"medium_confidence\\\", \\\"low_confidence\\\"))\\n    def
        request_additional_analysis(self):\\n        self.state.recommendations.append(\\\"Gather
        more data\\\")\\n        return \\\"Additional analysis required\\\"\\n```\\n\\nThis
        example demonstrates how to:\\n\\n1. Use Python code for basic data operations\\n2.
        Create and execute Crews as steps in your workflow\\n3. Use Flow decorators
        to manage the sequence of operations\\n4. Implement conditional branching
        based on Crew results\\n\\n## Connecting Your Crew to a Model\\n\\nCrewAI
        supports using various LLMs through a variety of connection options. By default
        your agents will use the OpenAI API when querying the model. However, there
        are several other ways to allow your agents to connect to models. For example,
        you can configure your agents to use a local model via the Ollama tool.\\n\\nPlease
        refer to the [Connect CrewAI to LLMs](https://docs.crewai.com/how-to/LLM-Connections/)
        page for details on configuring your agents' connections to models.\\n\\n##
        How CrewAI Compares\\n\\n**CrewAI's Advantage**: CrewAI combines autonomous
        agent intelligence with precise workflow control through its unique Crews
        and Flows architecture. The framework excels at both high-level orchestration
        and low-level customization, enabling complex, production-grade systems with
        granular control.\\n\\n- **LangGraph**: While LangGraph provides a foundation
        for building agent workflows, its approach requires significant boilerplate
        code and complex state management patterns. The framework's tight coupling
        with LangChain can limit flexibility when implementing custom agent behaviors
        or integrating with external systems.\\n\\n_P.S. CrewAI demonstrates significant
        performance advantages over LangGraph, executing 5.76x faster in certain cases
        like this QA task example ([see comparison](https://github.com/crewAIInc/crewAI-examples/tree/main/Notebooks/CrewAI%20Flows%20%26%20Langgraph/QA%20Agent))
        while achieving higher evaluation scores with faster completion times in certain
        coding tasks, like in this example ([detailed analysis](https://github.com/crewAIInc/crewAI-examples/blob/main/Notebooks/CrewAI%20Flows%20%26%20Langgraph/Coding%20Assistant/coding_assistant_eval.ipynb))._\\n\\n-
        **Autogen**: While Autogen excels at creating conversational agents capable
        of working together, it lacks an inherent concept of process. In Autogen,
        orchestrating agents' interactions requires additional programming, which
        can become complex and cumbersome as the scale of tasks grows.\\n- **ChatDev**:
        ChatDev introduced the idea of processes into the realm of AI agents, but
        its implementation is quite rigid. Customizations in ChatDev are limited and
        not geared towards production environments, which can hinder scalability and
        flexibility in real-world applications.\\n\\n## Contribution\\n\\nCrewAI is
        open-source and we welcome contributions. If you're looking to contribute,
        please:\\n\\n- Fork the repository.\\n- Create a new branch for your feature.\\n-
        Add your feature or improvement.\\n- Send a pull request.\\n- We appreciate
        your input!\\n\\n### Installing Dependencies\\n\\n```bash\\nuv lock\\nuv sync\\n```\\n\\n###
        Virtual Env\\n\\n```bash\\nuv venv\\n```\\n\\n### Pre-commit hooks\\n\\n```bash\\npre-commit
        install\\n```\\n\\n### Running Tests\\n\\n```bash\\nuv run pytest .\\n```\\n\\n###
        Running static type checks\\n\\n```bash\\nuvx mypy src\\n```\\n\\n### Packaging\\n\\n```bash\\nuv
        build\\n```\\n\\n### Installing Locally\\n\\n```bash\\npip install dist/*.tar.gz\\n```\\n\\n##
        Telemetry\\n\\nCrewAI uses anonymous telemetry to collect usage data with
        the main purpose of helping us improve the library by focusing our efforts
        on the most used features, integrations and tools.\\n\\nIt's pivotal to understand
        that **NO data is collected** concerning prompts, task descriptions, agents'
        backstories or goals, usage of tools, API calls, responses, any data processed
        by the agents, or secrets and environment variables, with the exception of
        the conditions mentioned. When the `share_crew` feature is enabled, detailed
        data including task descriptions, agents' backstories or goals, and other
        specific attributes are collected to provide deeper insights while respecting
        user privacy. Users can disable telemetry by setting the environment variable
        OTEL_SDK_DISABLED to true.\\n\\nData collected includes:\\n\\n- Version of
        CrewAI\\n  - So we can understand how many users are using the latest version\\n-
        Version of Python\\n  - So we can decide on what versions to better support\\n-
        General OS (e.g. number of CPUs, macOS/Windows/Linux)\\n  - So we know what
        OS we should focus on and if we could build specific OS related features\\n-
        Number of agents and tasks in a crew\\n  - So we make sure we are testing
        internally with similar use cases and educate people on the best practices\\n-
        Crew Process being used\\n  - Understand where we should focus our efforts\\n-
        If Agents are using memory or allowing delegation\\n  - Understand if we improved
        the features or maybe even drop them\\n- If Tasks are being executed in parallel
        or sequentially\\n  - Understand if we should focus more on parallel execution\\n-
        Language model being used\\n  - Improved support on most used languages\\n-
        Roles of agents in a crew\\n  - Understand high level use cases so we can
        build better tools, integrations and examples about it\\n- Tools names available\\n
        \ - Understand out of the publicly available tools, which ones are being used
        the most so we can improve them\\n\\nUsers can opt-in to Further Telemetry,
        sharing the complete telemetry data by setting the `share_crew` attribute
        to `True` on their Crews. Enabling `share_crew` results in the collection
        of detailed crew and task execution data, including `goal`, `backstory`, `context`,
        and `output` of tasks. This enables a deeper insight into usage patterns while
        respecting the user's choice to share.\\n\\n## License\\n\\nCrewAI is released
        under the [MIT License](https://github.com/crewAIInc/crewAI/blob/main/LICENSE).\\n\\n##
        Frequently Asked Questions (FAQ)\\n\\n### General\\n\\n- [What exactly is
        CrewAI?](#q-what-exactly-is-crewai)\\n- [How do I install CrewAI?](#q-how-do-i-install-crewai)\\n-
        [Does CrewAI depend on LangChain?](#q-does-crewai-depend-on-langchain)\\n-
        [Is CrewAI open-source?](#q-is-crewai-open-source)\\n- [Does CrewAI collect
        data from users?](#q-does-crewai-collect-data-from-users)\\n\\n### Features
        and Capabilities\\n\\n- [Can CrewAI handle complex use cases?](#q-can-crewai-handle-complex-use-cases)\\n-
        [Can I use CrewAI with local AI models?](#q-can-i-use-crewai-with-local-ai-models)\\n-
        [What makes Crews different from Flows?](#q-what-makes-crews-different-from-flows)\\n-
        [How is CrewAI better than LangChain?](#q-how-is-crewai-better-than-langchain)\\n-
        [Does CrewAI support fine-tuning or training custom models?](#q-does-crewai-support-fine-tuning-or-training-custom-models)\\n\\n###
        Resources and Community\\n\\n- [Where can I find real-world CrewAI examples?](#q-where-can-i-find-real-world-crewai-examples)\\n-
        [How can I contribute to CrewAI?](#q-how-can-i-contribute-to-crewai)\\n\\n###
        Enterprise Features\\n\\n- [What additional features does CrewAI AMP offer?](#q-what-additional-features-does-crewai-enterprise-offer)\\n-
        [Is CrewAI AMP available for cloud and on-premise deployments?](#q-is-crewai-enterprise-available-for-cloud-and-on-premise-deployments)\\n-
        [Can I try CrewAI AMP for free?](#q-can-i-try-crewai-enterprise-for-free)\\n\\n###
        Q: What exactly is CrewAI?\\n\\nA: CrewAI is a standalone, lean, and fast
        Python framework built specifically for orchestrating autonomous AI agents.
        Unlike frameworks like LangChain, CrewAI does not rely on external dependencies,
        making it leaner, faster, and simpler.\\n\\n### Q: How do I install CrewAI?\\n\\nA:
        Install CrewAI using pip:\\n\\n```shell\\npip install crewai\\n```\\n\\nFor
        additional tools, use:\\n\\n```shell\\npip install 'crewai[tools]'\\n```\\n\\n###
        Q: Does CrewAI depend on LangChain?\\n\\nA: No. CrewAI is built entirely from
        the ground up, with no dependencies on LangChain or other agent frameworks.
        This ensures a lean, fast, and flexible experience.\\n\\n### Q: Can CrewAI
        handle complex use cases?\\n\\nA: Yes. CrewAI excels at both simple and highly
        complex real-world scenarios, offering deep customization options at both
        high and low levels, from internal prompts to sophisticated workflow orchestration.\\n\\n###
        Q: Can I use CrewAI with local AI models?\\n\\nA: Absolutely! CrewAI supports
        various language models, including local ones. Tools like Ollama and LM Studio
        allow seamless integration. Check the [LLM Connections documentation](https://docs.crewai.com/how-to/LLM-Connections/)
        for more details.\\n\\n### Q: What makes Crews different from Flows?\\n\\nA:
        Crews provide autonomous agent collaboration, ideal for tasks requiring flexible
        decision-making and dynamic interaction. Flows offer precise, event-driven
        control, ideal for managing detailed execution paths and secure state management.
        You can seamlessly combine both for maximum effectiveness.\\n\\n### Q: How
        is CrewAI better than LangChain?\\n\\nA: CrewAI provides simpler, more intuitive
        APIs, faster execution speeds, more reliable and consistent results, robust
        documentation, and an active community\u2014addressing common criticisms and
        limitations associated with LangChain.\\n\\n### Q: Is CrewAI open-source?\\n\\nA:
        Yes, CrewAI is open-source and actively encourages community contributions
        and collaboration.\\n\\n### Q: Does CrewAI collect data from users?\\n\\nA:
        CrewAI collects anonymous telemetry data strictly for improvement purposes.
        Sensitive data such as prompts, tasks, or API responses are never collected
        unless explicitly enabled by the user.\\n\\n### Q: Where can I find real-world
        CrewAI examples?\\n\\nA: Check out practical examples in the [CrewAI-examples
        repository](https://github.com/crewAIInc/crewAI-examples), covering use cases
        like trip planners, stock analysis, and job postings.\\n\\n### Q: How can
        I contribute to CrewAI?\\n\\nA: Contributions are warmly welcomed! Fork the
        repository, create your branch, implement your changes, and submit a pull
        request. See the Contribution section of the README for detailed guidelines.\\n\\n###
        Q: What additional features does CrewAI AMP offer?\\n\\nA: CrewAI AMP provides
        advanced features such as a unified control plane, real-time observability,
        secure integrations, advanced security, actionable insights, and dedicated
        24/7 enterprise support.\\n\\n### Q: Is CrewAI AMP available for cloud and
        on-premise deployments?\\n\\nA: Yes, CrewAI AMP supports both cloud-based
        and on-premise deployment options, allowing enterprises to meet their specific
        security and compliance requirements.\\n\\n### Q: Can I try CrewAI AMP for
        free?\\n\\nA: Yes, you can explore part of the CrewAI AMP Suite by accessing
        the [Crew Control Plane](https://app.crewai.com) for free.\\n\\n### Q: Does
        CrewAI support fine-tuning or training custom models?\\n\\nA: Yes, CrewAI
        can integrate with custom-trained or fine-tuned models, allowing you to enhance
        your agents with domain-specific knowledge and accuracy.\\n\\n### Q: Can CrewAI
        agents interact with external tools and APIs?\\n\\nA: Absolutely! CrewAI agents
        can easily integrate with external tools, APIs, and databases, empowering
        them to leverage real-world data and resources.\\n\\n### Q: Is CrewAI suitable
        for production environments?\\n\\nA: Yes, CrewAI is explicitly designed with
        production-grade standards, ensuring reliability, stability, and scalability
        for enterprise deployments.\\n\\n### Q: How scalable is CrewAI?\\n\\nA: CrewAI
        is highly scalable, supporting simple automations and large-scale enterprise
        workflows involving numerous agents and complex tasks simultaneously.\\n\\n###
        Q: Does CrewAI offer debugging and monitoring tools?\\n\\nA: Yes, CrewAI AMP
        includes advanced debugging, tracing, and real-time observability features,
        simplifying the management and troubleshooting of your automations.\\n\\n###
        Q: What programming languages does CrewAI support?\\n\\nA: CrewAI is primarily
        Python-based but easily integrates with services and APIs written in any programming
        language through its flexible API integration capabilities.\\n\\n### Q: Does
        CrewAI offer educational resources for beginners?\\n\\nA: Yes, CrewAI provides
        extensive beginner-friendly tutorials, courses, and documentation through
        learn.crewai.com, supporting developers at all skill levels.\\n\\n### Q: Can
        CrewAI automate human-in-the-loop workflows?\\n\\nA: Yes, CrewAI fully supports
        human-in-the-loop workflows, allowing seamless collaboration between human
        experts and AI agents for enhanced decision-making.\\n\",\"description_content_type\":\"text/markdown\",\"docs_url\":null,\"download_url\":null,\"downloads\":{\"last_day\":-1,\"last_month\":-1,\"last_week\":-1},\"dynamic\":null,\"home_page\":null,\"keywords\":null,\"license\":null,\"license_expression\":null,\"license_files\":null,\"maintainer\":null,\"maintainer_email\":null,\"name\":\"crewai\",\"package_url\":\"https://pypi.org/project/crewai/\",\"platform\":null,\"project_url\":\"https://pypi.org/project/crewai/\",\"project_urls\":{\"Documentation\":\"https://docs.crewai.com\",\"Homepage\":\"https://crewai.com\",\"Repository\":\"https://github.com/crewAIInc/crewAI\"},\"provides_extra\":[\"a2a\",\"anthropic\",\"aws\",\"azure-ai-inference\",\"bedrock\",\"docling\",\"embeddings\",\"file-processing\",\"google-genai\",\"litellm\",\"mem0\",\"openpyxl\",\"pandas\",\"qdrant\",\"tools\",\"voyageai\",\"watson\"],\"release_url\":\"https://pypi.org/project/crewai/1.10.1/\",\"requires_dist\":[\"aiosqlite~=0.21.0\",\"appdirs~=1.4.4\",\"chromadb~=1.1.0\",\"click~=8.1.7\",\"httpx~=0.28.1\",\"instructor>=1.3.3\",\"json-repair~=0.25.2\",\"json5~=0.10.0\",\"jsonref~=1.1.0\",\"lancedb>=0.29.2\",\"mcp~=1.26.0\",\"openai<3,>=1.83.0\",\"openpyxl~=3.1.5\",\"opentelemetry-api~=1.34.0\",\"opentelemetry-exporter-otlp-proto-http~=1.34.0\",\"opentelemetry-sdk~=1.34.0\",\"pdfplumber~=0.11.4\",\"portalocker~=2.7.0\",\"pydantic-settings~=2.10.1\",\"pydantic~=2.11.9\",\"pyjwt<3,>=2.9.0\",\"python-dotenv~=1.1.1\",\"regex~=2026.1.15\",\"textual>=7.5.0\",\"tokenizers<1,>=0.21\",\"tomli-w~=1.1.0\",\"tomli~=2.0.2\",\"uv~=0.9.13\",\"a2a-sdk~=0.3.10;
