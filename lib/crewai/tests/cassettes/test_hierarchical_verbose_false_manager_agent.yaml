      so share absolutely everything you know, don't reference things but instead
      explain them.\",\"strict\":true,\"parameters\":{\"properties\":{\"task\":{\"description\":\"The
      task to delegate\",\"type\":\"string\"},\"context\":{\"description\":\"The context
      for the task\",\"type\":\"string\"},\"coworker\":{\"description\":\"The role/name
      of the coworker to delegate to\",\"type\":\"string\"}},\"required\":[\"task\",\"context\",\"coworker\"],\"type\":\"object\",\"additionalProperties\":false}}},{\"type\":\"function\",\"function\":{\"name\":\"ask_question_to_coworker\",\"description\":\"Ask
      a specific question to one of the following coworkers: Researcher, Senior Writer\\nThe
      input to this tool should be the coworker, the question you have for them, and
      ALL necessary context to ask the question properly, they know nothing about
      the question, so share absolutely everything you know, don't reference things
      but instead explain them.\",\"strict\":true,\"parameters\":{\"properties\":{\"question\":{\"description\":\"The
      question to ask\",\"type\":\"string\"},\"context\":{\"description\":\"The context
      for the question\",\"type\":\"string\"},\"coworker\":{\"description\":\"The
      role/name of the coworker to ask\",\"type\":\"string\"}},\"required\":[\"question\",\"context\",\"coworker\"],\"type\":\"object\",\"additionalProperties\":false}}}]}"
