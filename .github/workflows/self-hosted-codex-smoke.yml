name: Self-Hosted Codex Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: self-hosted-codex-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-smoke:
    name: codex-smoke
    if: |
      github.event_name != 'pull_request' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          startsWith(github.head_ref, 'sync/') ||
          startsWith(github.head_ref, 'codex/')
        )
      )
    runs-on:
      - self-hosted
      - macOS
    timeout-minutes: 40

    steps:
      - name: Prepare smoke sources
        env:
          TARGET_DIR: ${{ runner.workspace }}/${{ github.event.repository.name }}
        run: |
          set -euxo pipefail
          cd "${RUNNER_TEMP}"
          CACHE_ROOT="${HOME}/.cache/crewai-codex-smoke"
          REPO_URL="https://github.com/${{ github.repository }}.git"
          CACHE_DIR="${CACHE_ROOT}/repos/${{ github.repository_owner }}-${{ github.event.repository.name }}.git"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CLONE_REF="${{ github.head_ref }}"
            EXPECTED_SHA="${{ github.event.pull_request.head.sha }}"
          else
            CLONE_REF="${{ github.ref_name }}"
            EXPECTED_SHA="${{ github.sha }}"
          fi
          install -d "${CACHE_ROOT}/repos"
          if [[ -d "${CACHE_DIR}" ]]; then
            echo "source_cache=hit"
            GIT_TERMINAL_PROMPT=0 git --git-dir="${CACHE_DIR}" fetch \
              --depth=1 \
              --filter=blob:none \
              origin \
              "+refs/heads/${CLONE_REF}:refs/heads/${CLONE_REF}"
          else
            echo "source_cache=miss"
            GIT_TERMINAL_PROMPT=0 git clone \
              --bare \
              --filter=blob:none \
              --depth=1 \
              --branch "${CLONE_REF}" \
              "${REPO_URL}" \
              "${CACHE_DIR}"
          fi
          if ! git --git-dir="${CACHE_DIR}" cat-file -e "${EXPECTED_SHA}^{commit}" 2>/dev/null; then
            GIT_TERMINAL_PROMPT=0 git --git-dir="${CACHE_DIR}" fetch \
              --depth=1 \
              --filter=blob:none \
              origin \
              "${EXPECTED_SHA}"
          fi
          git --git-dir="${CACHE_DIR}" worktree prune
          if [[ -e "${TARGET_DIR}" ]]; then
            git --git-dir="${CACHE_DIR}" worktree remove --force "${TARGET_DIR}" 2>/dev/null || rm -rf "${TARGET_DIR}"
          fi
          git --git-dir="${CACHE_DIR}" worktree add --force --detach --no-checkout "${TARGET_DIR}" "${EXPECTED_SHA}"
          git -C "${TARGET_DIR}" sparse-checkout init --no-cone
          git -C "${TARGET_DIR}" sparse-checkout set --no-cone .dockerignore .github/docker lib/crewai scripts
          git -C "${TARGET_DIR}" checkout --detach "${EXPECTED_SHA}"
          cd "${TARGET_DIR}"
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Require local Codex auth.json
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          CODEX_HOME_PATH="${CODEX_HOME:-${HOME}/.codex}"
          AUTH_JSON="${CODEX_HOME_PATH%/}/auth.json"
          test -f "${AUTH_JSON}"
          CODEX_AUTH_JSON="${AUTH_JSON}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          auth_json = Path(os.environ["CODEX_AUTH_JSON"])
          payload = json.loads(auth_json.read_text(encoding="utf-8"))
          tokens = payload.get("tokens") if isinstance(payload, dict) else None
          if not isinstance(tokens, dict):
              raise SystemExit("Codex auth.json does not contain a tokens object.")
          if not (tokens.get("access_token") or tokens.get("refresh_token")):
              raise SystemExit("Codex auth.json does not contain reusable OAuth tokens.")
          print(f"codex_auth_json={auth_json}")
          PY

      - name: Run isolated Docker smoke
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          chmod +x scripts/run_docker_codex_smoke.sh
          bash scripts/run_docker_codex_smoke.sh

      - name: Ask Codex to fix the PR when smoke fails
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo wangguanran/crewAI \
            --body "@codex The self-hosted codex smoke check failed for this PR. Please investigate, update this branch, and submit a patch that gets the PR merge-ready."
