name: Self-Hosted Codex Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: self-hosted-codex-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-smoke:
    name: codex-smoke
    if: |
      github.event_name != 'pull_request' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.head_ref, 'sync/')
      )
    runs-on:
      - self-hosted
      - macOS
    timeout-minutes: 40

    steps:
      - name: Reset runner workspace
        run: |
          set -euxo pipefail
          rm -rf "${{ runner.workspace }}/${{ github.event.repository.name }}"
          mkdir -p "${{ runner.workspace }}/${{ github.event.repository.name }}"

      - name: Download source archive
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/crewai-source.tar.gz
          TARGET_DIR: ${{ runner.workspace }}/${{ github.event.repository.name }}
        run: |
          set -euxo pipefail
          curl -L --fail \
            "https://codeload.github.com/${{ github.repository }}/tar.gz/${{ github.sha }}" \
            -o "${ARCHIVE_PATH}"
          tar -xzf "${ARCHIVE_PATH}" -C "${TARGET_DIR}" --strip-components=1

      - name: Require local Codex auth.json
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          test -f "${HOME}/.codex/auth.json"
          python3 - <<'PY'
          import json
          from pathlib import Path

          auth_json = Path.home() / ".codex" / "auth.json"
          payload = json.loads(auth_json.read_text(encoding="utf-8"))
          tokens = payload.get("tokens") if isinstance(payload, dict) else None
          if not isinstance(tokens, dict):
              raise SystemExit("Codex auth.json does not contain a tokens object.")
          if not (tokens.get("access_token") or tokens.get("refresh_token")):
              raise SystemExit("Codex auth.json does not contain reusable OAuth tokens.")
          print(f"codex_auth_json={auth_json}")
          PY

      - name: Run isolated Docker smoke
        env:
          IMAGE_TAG: crewai-codex-smoke:${{ github.run_id }}-${{ github.run_attempt }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          chmod +x scripts/run_docker_codex_smoke.sh
          bash scripts/run_docker_codex_smoke.sh

      - name: Remove smoke Docker image
        if: always()
        env:
          IMAGE_TAG: crewai-codex-smoke:${{ github.run_id }}-${{ github.run_attempt }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          docker image rm -f "${IMAGE_TAG}" || true

      - name: Ask Codex to fix the sync PR when smoke fails
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo wangguanran/crewAI \
            --body "@codex The self-hosted codex smoke check failed for this sync PR. Please investigate, update this branch, and submit a patch that gets the PR merge-ready."
