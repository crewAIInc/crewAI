name: Self-Hosted Codex Prewarm

on:
  push:
    branches:
      - main
    paths:
      - .github/docker/codex-smoke.Dockerfile
      - .github/workflows/self-hosted-codex-prewarm.yml
      - .github/workflows/self-hosted-codex-smoke.yml
      - lib/crewai/pyproject.toml
      - scripts/_codex_smoke_image.sh
      - scripts/run_docker_codex_smoke.sh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: self-hosted-codex-prewarm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prewarm:
    name: prewarm
    runs-on:
      - self-hosted
      - macOS
    timeout-minutes: 20

    steps:
      - name: Prepare smoke sources
        env:
          TARGET_DIR: ${{ runner.workspace }}/${{ github.event.repository.name }}
        run: |
          set -euxo pipefail
          cd "${RUNNER_TEMP}"
          CACHE_ROOT="${HOME}/.cache/crewai-codex-smoke"
          REPO_URL="https://github.com/${{ github.repository }}.git"
          CACHE_DIR="${CACHE_ROOT}/repos/${{ github.repository_owner }}-${{ github.event.repository.name }}.git"
          CLONE_REF="${{ github.ref_name }}"
          EXPECTED_SHA="${{ github.sha }}"
          install -d "${CACHE_ROOT}/repos"
          if [[ -d "${CACHE_DIR}" ]]; then
            echo "source_cache=hit"
            GIT_TERMINAL_PROMPT=0 git --git-dir="${CACHE_DIR}" fetch \
              --depth=1 \
              --filter=blob:none \
              origin \
              "+refs/heads/${CLONE_REF}:refs/heads/${CLONE_REF}"
          else
            echo "source_cache=miss"
            GIT_TERMINAL_PROMPT=0 git clone \
              --bare \
              --filter=blob:none \
              --depth=1 \
              --branch "${CLONE_REF}" \
              "${REPO_URL}" \
              "${CACHE_DIR}"
          fi
          if ! git --git-dir="${CACHE_DIR}" cat-file -e "${EXPECTED_SHA}^{commit}" 2>/dev/null; then
            GIT_TERMINAL_PROMPT=0 git --git-dir="${CACHE_DIR}" fetch \
              --depth=1 \
              --filter=blob:none \
              origin \
              "${EXPECTED_SHA}"
          fi
          git --git-dir="${CACHE_DIR}" worktree prune
          if [[ -e "${TARGET_DIR}" ]]; then
            git --git-dir="${CACHE_DIR}" worktree remove --force "${TARGET_DIR}" 2>/dev/null || rm -rf "${TARGET_DIR}"
          fi
          git --git-dir="${CACHE_DIR}" worktree add --force --detach --no-checkout "${TARGET_DIR}" "${EXPECTED_SHA}"
          git -C "${TARGET_DIR}" sparse-checkout init --no-cone
          git -C "${TARGET_DIR}" sparse-checkout set --no-cone .dockerignore .github/docker lib/crewai scripts
          git -C "${TARGET_DIR}" checkout --detach "${EXPECTED_SHA}"

      - name: Build cached smoke image
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          # shellcheck source=/Users/wangguanran/Codes/crewAI/scripts/_codex_smoke_image.sh
          source scripts/_codex_smoke_image.sh
          ensure_codex_smoke_image
